name: Build iOS IPA

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get
      
      - name: Generate code
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Install CocoaPods
        working-directory: mobile/ios
        run: |
          pod install --repo-update || pod install
      
      - name: Prepare iOS build
        working-directory: mobile
        run: |
          flutter build ios --release --no-codesign || true
          
      - name: Build unsigned release with xcodebuild
        working-directory: mobile/ios
        run: |
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO
      
      - name: Create IPA for AltStore
        run: |
          cd mobile/ios/build/Runner.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r MamaApp.ipa Payload
          mv MamaApp.ipa ../../../../../..
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MamaApp-iOS
          path: mobile/ios/MamaApp.ipa
          retention-days: 7
