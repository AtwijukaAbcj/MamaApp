name: Build iOS IPA

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get
      
      - name: Generate code
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('mobile/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install CocoaPods
        working-directory: mobile/ios
        run: |
          for i in 1 2 3; do
            pod install && break || sleep 15
          done
      
      - name: Prepare Flutter iOS build
        working-directory: mobile
        run: |
          flutter build ios --config-only --release --no-codesign
      
      - name: Build with xcodebuild (unsigned)
        working-directory: mobile/ios
        run: |
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
      
      - name: Create IPA for AltStore
        working-directory: mobile/ios
        run: |
          cd build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r MamaApp.ipa Payload
          rm -rf Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MamaApp-iOS
          path: mobile/ios/build/Build/Products/Release-iphoneos/MamaApp.ipa
          retention-days: 7
