name: Build iOS IPA

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get
      
      - name: Generate code
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install --repo-update
      
      - name: Disable code signing in Xcode project
        working-directory: mobile/ios
        run: |
          # Modify project.pbxproj to disable code signing
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          
      - name: Build iOS Release
        working-directory: mobile
        run: |
          flutter build ios --release --no-codesign
        continue-on-error: true
          
      - name: Build with xcodebuild (unsigned)
        working-directory: mobile/ios
        run: |
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY_NAME=""
      
      - name: Create IPA for AltStore
        working-directory: mobile/ios
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/Runner.app"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MamaApp.ipa Payload
          rm -rf Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MamaApp-iOS
          path: mobile/ios/MamaApp.ipa
          retention-days: 7
