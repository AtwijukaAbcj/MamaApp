name: mama_app
description: Maternal Health Monitoring App - Offline-first with BLE device support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Local database
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3
  
  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # BLE
  flutter_blue_plus: ^1.31.13
  permission_handler: ^11.3.0
  
  # HealthKit / Apple Watch
  health: ^10.2.0
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  fl_chart: ^0.66.2
  intl: ^0.19.0
  
  # Utilities
  uuid: ^4.3.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Security
  flutter_secure_storage: ^9.0.0
  
  # Location
  geolocator: ^11.0.0
  
  # Notifications
  flutter_local_notifications: ^16.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.15.0
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  # Fonts (add font files to assets/fonts/ when ready)
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
